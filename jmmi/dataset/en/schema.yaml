# config/schemas/jmmi_schema.yaml
# JMMI Dataset Configuration

_imports:
  - "../../../common/schema_defaults.yaml"

dataset_type: "jmmi_dataset"

schema_loaded_sheets:
  - $use: raw_data
  
  - $use: clean_data
    $append_mandatory_columns:
      - standard_name: "country"
        allow_fuzzy_matching: false
      - standard_name: "round"
        allow_fuzzy_matching: false
      - standard_name: "date"
        allow_fuzzy_matching: false
      - standard_name: "month"
        allow_fuzzy_matching: false
      - standard_name: "year"
        allow_fuzzy_matching: false
      - standard_name: "admin1_code"
        allow_fuzzy_matching: false
      - standard_name: "admin1_label"
        allow_fuzzy_matching: false
      - standard_name: "admin2_code"
        allow_fuzzy_matching: false
      - standard_name: "admin2_label" 
        allow_fuzzy_matching: false

  - $use: cleaning_log_base
    $append_mandatory_columns:
      - $use: uuid_column
    
  - $use: survey
  - $use: choices
  - $use: deletion_log  
  - $use: variable_tracker_sheet
  - $use: meb_analysis
  - $use: mfs_analysis


schema_unloaded_sheets:
  - $use: read_me
  - $use: sampling_info  
  - $use: enumerator_performance_sheet

  